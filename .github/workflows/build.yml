name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build and package
        shell: pwsh
        run: .\scripts\Publish-Package.ps1 -Configuration Debug

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FluentPassFinder-debug
          path: build\FluentPassFinder-*.zip
